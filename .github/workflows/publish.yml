name: Publish to npm

# Publishes @videochamada/embed when a GitHub Release is published.
# Requires a repo secret NPM_TOKEN (an npm automation token with publish rights
# to the @videochamada scope).

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Smoke tests
        run: node test/smoke.mjs
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
